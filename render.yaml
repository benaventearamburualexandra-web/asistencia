services:
  - type: web
    name: asistencia-docente
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/asistencia.db
    disk:
      name: database-disk
      mountPath: /data
      sizeGB: 1
